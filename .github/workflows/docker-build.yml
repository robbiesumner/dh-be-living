name: Build and Push to GHCR

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # These permissions are required for GitHub Actions to push to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Docker Image with Nix
        run: nix build .#docker

      - name: Load image into Docker
        run: docker load < result

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push
        run: |
          LOWER_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="ghcr.io/$LOWER_OWNER/dh-be-living"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          docker tag dh-be-living:latest $IMAGE_BASE:sha-$SHORT_SHA
          docker push $IMAGE_BASE:sha-$SHORT_SHA

          if [ "${{ github.event_name }}" == "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            docker tag dh-be-living:latest $IMAGE_BASE:pr-$PR_NUMBER
            docker push $IMAGE_BASE:pr-$PR_NUMBER
            echo "✅ Pushed PR image: $IMAGE_BASE:pr-$PR_NUMBER"
            
          else
            docker tag dh-be-living:latest $IMAGE_BASE:main
            docker push $IMAGE_BASE:main
            
            docker tag dh-be-living:latest $IMAGE_BASE:latest
            docker push $IMAGE_BASE:latest
            echo "✅ Pushed Main/Latest images"
          fi
